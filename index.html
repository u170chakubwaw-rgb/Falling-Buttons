<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crazy Button Challenge</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="ui">
      <h1>Click the Button! 👆👆👆👆</h1>
      <p>Click it 10 times as fast as you can</p>
      <p id="score">Score: 0</p>
      <p id="time">Time: 0.00s</p>
      <p class="hint">Press 'R' to reset the game</p>
    </div>

    <button id="gameButton">CLICK ME!</button>

    <script src="script.js"></script>
  </body>
</html>
